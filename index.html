<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARISE - Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0D0D0F;
      color: #F5F5F5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    h1 {
      color: #D4AF37;
      font-size: 3rem;
      margin-bottom: 8px;
      letter-spacing: 4px;
    }
    .tagline {
      color: #888;
      font-size: 1.1rem;
      margin-bottom: 48px;
    }
    .links {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    a {
      color: #F5F5F5;
      background: #1A1A2E;
      padding: 16px 32px;
      border-radius: 8px;
      text-decoration: none;
      border: 1px solid #D4AF37;
      transition: all 0.2s;
    }
    a:hover {
      background: #D4AF37;
      color: #0D0D0F;
    }
    .footer {
      margin-top: 64px;
      color: #666;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>ARISE</h1>
  <p class="tagline">Feed the Spark. Level up.</p>
  
  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
  </div>

  <p class="footer">© 2026 ARISE. All rights reserved.</p>
</body>
</html>
